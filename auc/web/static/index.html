<!DOCTYPE html>
<html lang="zh-CN" data-color-theme="monokai">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AuC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/themes.css?v=35" />
  <link rel="stylesheet" href="/static/styles.css?v=53" />
  <link rel="stylesheet" href="/static/polish.css?v=3" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="/static/vendor/xterm.css?v=25" />
</head>
<body>
  <div id="app" class="mode-code" data-color-theme="monokai" data-icon-theme="office-material">
    <header class="topbar">
      <div class="brand">
        <span class="logo">◆</span>
        <span class="name">AuC</span>
        <span class="version clickable" id="version" data-i18n-title="version.check"></span>
      </div>
      <div class="mode-switch" role="tablist">
        <button type="button" class="mode-btn active" data-mode="code" role="tab">Code</button>
        <button type="button" class="mode-btn" data-mode="chat" role="tab">Chat</button>
      </div>
      <div class="topbar-meta">
        <button type="button" class="btn ghost sm lang-toggle" id="lang-toggle" title="Switch language">EN</button>
        <div class="theme-picker-wrap" id="theme-picker-wrap">
          <button type="button" class="icon-btn" id="theme-picker-btn" data-i18n-title="theme.menu" aria-haspopup="true" aria-expanded="false"></button>
          <div class="theme-picker-menu hidden" id="theme-picker-menu" role="menu" aria-label="Theme">
            <div class="theme-picker-section">
              <div class="theme-picker-label" data-i18n="theme.colors"></div>
              <div class="theme-picker-list" id="color-theme-list"></div>
            </div>
            <div class="theme-picker-section">
              <div class="theme-picker-label" data-i18n="theme.icons"></div>
              <div class="theme-picker-list" id="icon-theme-list"></div>
            </div>
          </div>
        </div>
        <div class="choice-pill-group">
          <span class="choice-pill choice-pill-role clickable" id="role-pill" data-i18n-title="plaza.roleOpen"></span>
          <span class="choice-pill choice-pill-skill clickable" id="skill-pill" data-i18n-title="plaza.skillOpen"></span>
          <span class="choice-pill choice-pill-model clickable" id="model-pill" data-i18n-title="plaza.modelOpen"></span>
        </div>
        <button type="button" class="btn ghost sm plaza-link-btn" id="model-conn-btn" data-i18n="plaza.modelConn" data-i18n-title="plaza.modelConn"></button>
        <span class="ws-pill" id="ws-pill" data-i18n-title="ws.pill"></span>
      </div>
    </header>

    <div id="update-banner" class="update-banner hidden" role="status" aria-live="polite">
      <p class="update-banner-text" id="update-banner-text"></p>
      <p class="update-banner-hint">
        <span data-i18n="update.cmd"></span><code class="update-banner-cmd" id="update-banner-cmd"></code>
      </p>
      <a class="update-banner-link" id="update-banner-link" href="#" target="_blank" rel="noopener" data-i18n="update.pypi"></a>
      <button type="button" class="btn primary sm" id="update-banner-upgrade" data-i18n="update.upgrade"></button>
      <button type="button" class="btn ghost sm" id="update-banner-dismiss" data-i18n="update.dismiss"></button>
      <p class="update-upgrade-status hidden" id="update-upgrade-status"></p>
    </div>

    <nav class="sidebar-rail" id="sidebar-rail" data-i18n-aria="nav.sidebar">
      <button type="button" class="rail-btn" id="sidebar-show" data-i18n-title="sidebar.expand"></button>
      <span class="rail-divider"></span>
      <button type="button" class="rail-btn" data-rail-section="workspace" data-i18n-title="nav.workspace"></button>
      <button type="button" class="rail-btn" data-rail-section="projects" data-i18n-title="nav.projects"></button>
      <button type="button" class="rail-btn" data-rail-section="conversations" data-i18n-title="nav.conversations"></button>
    </nav>

    <div class="layout">
      <aside class="workspace-panel" id="workspace-panel">
        <div class="sidebar-top">
          <button type="button" class="icon-btn" id="sidebar-hide" data-i18n-title="sidebar.collapse"></button>
        </div>

        <section class="sidebar-section" data-section="workspace" id="section-workspace">
          <header class="section-head">
            <span class="section-leading" id="icon-sec-workspace"></span>
            <span class="section-title" data-i18n="nav.workspace"></span>
            <div class="section-actions">
              <button type="button" class="icon-btn" id="ws-new-file" data-i18n-title="ws.newFile"></button>
              <button type="button" class="icon-btn" id="ws-new-folder" data-i18n-title="ws.newFolder"></button>
              <button type="button" class="icon-btn" id="ws-refresh" data-i18n-title="ws.refresh"></button>
              <button type="button" class="icon-btn section-toggle" data-section="workspace" data-i18n-title="sidebar.fold"></button>
            </div>
          </header>
          <div class="section-body">
            <div class="ws-path" id="ws-path">.</div>
            <nav class="file-tree" id="file-tree" data-i18n-aria="nav.fileTree"></nav>
            <div id="tree-context-menu" class="tree-context-menu hidden" role="menu"></div>
          </div>
        </section>

        <section class="sidebar-section" data-section="projects" id="section-projects">
          <header class="section-head">
            <span class="section-leading" id="icon-sec-projects"></span>
            <span class="section-title" data-i18n="nav.projects"></span>
            <div class="section-actions">
              <button type="button" class="icon-btn" id="projects-refresh" data-i18n-title="ws.refresh"></button>
              <button type="button" class="icon-btn section-toggle" data-section="projects" data-i18n-title="sidebar.fold"></button>
            </div>
          </header>
          <div class="section-body">
            <div class="project-list" id="project-list"></div>
          </div>
        </section>

        <section class="sidebar-section" data-section="conversations" id="section-conversations">
          <header class="section-head">
            <span class="section-leading" id="icon-sec-conversations"></span>
            <span class="section-title" data-i18n="nav.conversations"></span>
            <div class="section-actions">
              <button type="button" class="icon-btn" id="conv-new" data-i18n-title="conv.new"></button>
              <button type="button" class="icon-btn section-toggle" data-section="conversations" data-i18n-title="sidebar.fold"></button>
            </div>
          </header>
          <div class="section-body">
            <div class="conversation-list" id="conversation-list"></div>
          </div>
        </section>
      </aside>

      <main class="editor-panel" id="editor-panel">
        <div class="tab-bar" id="tab-bar">
          <div class="tab-bar-tabs" id="tab-bar-tabs"></div>
          <div class="tab-bar-actions">
            <button type="button" class="icon-btn" id="btn-terminal" data-i18n-title="terminal.title"></button>
          </div>
        </div>
        <div class="md-toolbar hidden" id="md-toolbar">
          <button type="button" class="btn ghost sm" data-md-view="edit" data-i18n="editor.mdEdit"></button>
          <button type="button" class="btn ghost sm" data-md-view="preview" data-i18n="editor.mdPreview"></button>
        </div>
        <div class="editor-split" id="editor-split">
          <div class="editor-wrap" id="editor-wrap">
            <div id="monaco" class="monaco-host"></div>
            <div id="md-preview" class="md-preview hidden"></div>
            <div id="image-preview" class="image-preview hidden"></div>
            <div id="doc-preview" class="doc-preview hidden"></div>
            <div id="app-preview" class="app-preview hidden">
              <div class="preview-toolbar">
                <span id="preview-title" data-i18n="editor.preview"></span>
                <button type="button" class="btn ghost sm" id="preview-stop" data-i18n="editor.stop"></button>
                <button type="button" class="btn ghost sm" id="preview-newtab" data-i18n="editor.newTab"></button>
              </div>
              <iframe id="preview-frame" data-i18n-title="editor.projectPreview" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
            </div>
            <div class="editor-empty" id="editor-empty">
              <p data-i18n="editor.pickFile"></p>
              <p class="hint" data-i18n="editor.hint"></p>
            </div>
          </div>
          <div class="terminal-panel is-collapsed" id="terminal-panel">
            <div class="terminal-resize-handle" id="terminal-resize-handle" data-i18n-title="terminal.resize"></div>
            <header class="terminal-toolbar">
              <nav class="terminal-tabs" id="terminal-tabs" data-i18n-aria="terminal.tabs"></nav>
              <div class="terminal-actions">
                <button type="button" class="icon-btn sm" id="terminal-new" data-i18n-title="terminal.new"></button>
                <div class="terminal-picker-wrap">
                  <button type="button" class="icon-btn sm" id="terminal-picker" data-i18n-title="terminal.pick" aria-haspopup="true" aria-expanded="false"></button>
                  <div class="terminal-picker-menu hidden" id="terminal-picker-menu" role="menu"></div>
                </div>
                <button type="button" class="icon-btn" id="terminal-close" data-i18n-title="terminal.hide"></button>
              </div>
            </header>
            <div class="terminal-hosts" id="terminal-hosts" data-i18n-title="terminal.linkHint">
              <div class="terminal-action-bar hidden" id="terminal-action-bar" role="toolbar">
                <span class="terminal-action-hint" id="terminal-action-hint"></span>
                <button type="button" class="btn ghost sm" id="terminal-action-copy" data-i18n="terminal.copy"></button>
                <button type="button" class="btn primary sm" id="terminal-action-agent" data-i18n="terminal.toAgent"></button>
                <label class="terminal-action-auto" title="">
                  <input type="checkbox" id="terminal-auto-agent" />
                  <span data-i18n="terminal.autoAgent"></span>
                </label>
                <button type="button" class="terminal-action-dismiss" id="terminal-action-dismiss" aria-label="×">×</button>
              </div>
            </div>
          </div>
        </div>
      </main>

      <header class="chat-header" id="chat-header">
        <div class="chat-header-inner">
          <div id="chat-update-notice" class="chat-update-notice hidden" role="status" aria-live="polite">
            <p class="chat-update-text" id="chat-update-text"></p>
            <p class="chat-update-hint" id="chat-update-hint"></p>
            <button type="button" class="btn primary sm" id="chat-update-upgrade" data-i18n="update.upgrade"></button>
            <button type="button" class="btn ghost sm" id="chat-update-dismiss" data-i18n="update.gotIt"></button>
          </div>
          <div class="agent-profile" id="agent-profile">
            <div class="agent-profile-primary">
              <div class="agent-avatar" aria-hidden="true">◆</div>
              <div class="agent-profile-text">
                <div class="agent-title-row">
                  <h1 class="agent-title" id="agent-title"></h1>
                  <span class="agent-status" id="agent-status"></span>
                </div>
                <p class="agent-desc" id="agent-desc"></p>
                <div class="agent-usage" id="agent-usage" hidden></div>
              </div>
            </div>
            <div class="agent-meta" id="agent-meta" hidden></div>
            <div class="agent-tags" id="agent-tags" hidden></div>
            <div class="work-mode-bar" id="work-mode-bar">
              <label class="work-mode-label" data-i18n="agent.role"></label>
              <div class="role-tree-select" id="role-tree-chat">
                <button type="button" class="role-tree-trigger work-mode-select" aria-haspopup="listbox" aria-expanded="false">
                  <span class="role-tree-trigger-label"></span>
                  <span class="role-tree-chevron" aria-hidden="true">▾</span>
                </button>
                <div class="role-tree-menu hidden" role="listbox"></div>
              </div>
              <label class="work-mode-label" for="work-mode-select" data-i18n="agent.mode"></label>
              <select id="work-mode-select" class="work-mode-select" data-i18n-title="agent.modeTitle"></select>
              <label class="work-mode-label" for="approval-mode-select" data-i18n="agent.approval"></label>
              <select id="approval-mode-select" class="work-mode-select sm" data-i18n-title="agent.approvalTitle"></select>
            </div>
          </div>
        </div>
      </header>

      <main class="chat-main" id="chat-main">
        <div class="chat-scroll">
          <div class="chat-center">
            <div class="chat-messages" id="chat-messages"></div>
          </div>
        </div>
      </main>

      <aside class="agent-panel" id="agent-panel">
        <div class="panel-head">
          <div class="panel-head-lead">
            <span class="panel-title" data-i18n="nav.agent"></span>
            <span class="agent-status" id="agent-status-code"></span>
          </div>
          <button type="button" class="icon-btn" id="chat-clear" data-i18n-title="agent.clear"></button>
        </div>
        <div class="agent-messages" id="agent-messages"></div>
        <form class="composer" id="composer">
          <div class="context-bar" id="context-bar">
            <label class="work-mode-inline" data-i18n-title="agent.role">
              <span class="work-mode-label" data-i18n="agent.role"></span>
              <div class="role-tree-select sm" id="role-tree-agent">
                <button type="button" class="role-tree-trigger work-mode-select sm" aria-haspopup="listbox" aria-expanded="false">
                  <span class="role-tree-trigger-label"></span>
                  <span class="role-tree-chevron" aria-hidden="true">▾</span>
                </button>
                <div class="role-tree-menu hidden" role="listbox"></div>
              </div>
            </label>
            <label class="work-mode-inline" data-i18n-title="agent.mode">
              <span class="work-mode-label" data-i18n="agent.modeShort"></span>
              <select id="work-mode-agent" class="work-mode-select sm"></select>
            </label>
            <label class="work-mode-inline" data-i18n-title="agent.approvalTitle">
              <span class="work-mode-label" data-i18n="agent.approvalShort"></span>
              <select id="approval-mode-agent" class="work-mode-select sm"></select>
            </label>
            <label class="ctx-toggle" data-i18n-title="agent.autoAttach">
              <input type="checkbox" id="ctx-auto" checked />
              <span id="ctx-label" data-i18n="agent.attachFile"></span>
            </label>
            <button type="button" class="btn ghost sm" id="btn-insert-file" data-i18n-title="agent.insertFile" data-i18n="agent.insertFile"></button>
            <button type="button" class="btn ghost sm" id="btn-insert-sel" data-i18n-title="agent.insertSel" data-i18n="agent.insertSel"></button>
            <button type="button" class="btn ghost sm" id="btn-review" data-i18n-title="review.title" data-i18n="review.button"></button>
          </div>
          <div class="attach-strip" id="attach-strip-agent"></div>
          <textarea id="prompt" rows="3" data-i18n-placeholder="agent.promptCode"></textarea>
          <div class="composer-actions">
            <input type="file" id="file-agent" accept="image/png,image/jpeg,image/gif,image/webp" multiple hidden />
            <button type="button" class="btn ghost icon-only" id="btn-attach-agent" data-i18n-title="agent.upload"></button>
            <button type="button" class="btn ghost" id="btn-cancel" data-i18n="agent.cancel"></button>
            <button type="submit" class="btn primary" id="btn-send" data-i18n="agent.send"></button>
          </div>
        </form>
      </aside>
    </div>

    <div class="chat-composer-bar" id="chat-composer-bar">
      <div class="chat-composer-inner">
        <div class="attach-col">
          <div class="attach-strip" id="attach-strip-chat"></div>
          <textarea id="prompt-chat" rows="2" data-i18n-placeholder="agent.promptChat"></textarea>
        </div>
        <input type="file" id="file-chat" accept="image/png,image/jpeg,image/gif,image/webp" multiple hidden />
        <button type="button" class="btn ghost icon-only" id="btn-attach-chat" data-i18n-title="agent.upload"></button>
        <button type="button" class="btn ghost icon-only" id="btn-clear-chat" data-i18n-title="agent.clearChat"></button>
        <button type="button" class="btn ghost" id="btn-cancel-chat" disabled data-i18n="agent.cancel"></button>
        <button type="button" class="btn primary" id="btn-send-chat" data-i18n="agent.send"></button>
      </div>
    </div>
  </div>

  <div id="ws-create-overlay" class="approval-overlay hidden" role="dialog" aria-modal="true">
    <div class="approval-card ws-create-card">
      <h3 class="approval-title" id="ws-create-title" data-i18n="common.new"></h3>
      <p class="approval-summary" id="ws-create-hint"></p>
      <input type="text" class="ws-create-input" id="ws-create-input" autocomplete="off" spellcheck="false" />
      <p class="ws-create-error hidden" id="ws-create-error"></p>
      <div class="approval-actions">
        <button type="button" class="btn ghost" id="ws-create-cancel" data-i18n="common.cancel"></button>
        <button type="button" class="btn primary" id="ws-create-confirm" data-i18n="common.create"></button>
      </div>
    </div>
  </div>

  <div id="model-settings-overlay" class="approval-overlay hidden" role="dialog" aria-modal="true">
    <div class="approval-card model-settings-card">
      <h3 class="approval-title" data-i18n="plaza.modelConn"></h3>
      <label class="model-field">
        <span class="model-field-label" data-i18n="model.saveTo"></span>
        <select id="model-settings-scope" class="work-mode-select">
          <option value="project_local" data-i18n="model.scope.local"></option>
          <option value="project" data-i18n="model.scope.project"></option>
          <option value="global" data-i18n="model.scope.global"></option>
        </select>
        <span class="model-field-hint" id="model-settings-scope-hint"></span>
      </label>
      <label class="model-field">
        <span class="model-field-label">Provider</span>
        <select id="model-settings-provider" class="work-mode-select">
          <option value="openai" data-i18n="model.provider.openai"></option>
          <option value="anthropic" data-i18n="model.provider.anthropic"></option>
          <option value="deepseek">DeepSeek</option>
        </select>
      </label>
      <label class="model-field">
        <span class="model-field-label" data-i18n="model.baseUrl"></span>
        <div class="model-preset-row">
          <input type="text" class="ws-create-input" id="model-settings-base-url" autocomplete="off" spellcheck="false" placeholder="http://ailab.hcrdi.com/api" />
          <button type="button" class="btn ghost sm" id="model-settings-ailab-preset" title="AILab">AILab</button>
        </div>
      </label>
      <label class="model-field">
        <span class="model-field-label" data-i18n="model.apiKey"></span>
        <div class="model-secret-row">
          <input type="password" class="ws-create-input model-secret-input" id="model-settings-api-key" autocomplete="off" spellcheck="false" data-i18n-placeholder="model.keyPlaceholder" />
          <button type="button" class="icon-btn model-secret-toggle" id="model-settings-key-toggle" data-i18n-title="model.showKey" data-i18n-aria="model.showKey" aria-pressed="false"></button>
        </div>
        <span class="model-field-hint" id="model-settings-key-hint"></span>
      </label>
      <div class="model-conn-bar">
        <span class="model-conn-current">
          <span data-i18n="model.currentModel"></span>
          <code id="model-settings-current-model">—</code>
        </span>
        <button type="button" class="btn ghost sm" id="model-settings-open-plaza" data-i18n="plaza.modelOpen"></button>
      </div>
      <span class="model-field-hint" id="model-settings-conn-status"></span>
      <p class="ws-create-error hidden" id="model-settings-error"></p>
      <div class="approval-actions">
        <button type="button" class="btn ghost" id="model-settings-cancel" data-i18n="common.cancel"></button>
        <button type="button" class="btn primary" id="model-settings-save" data-i18n="common.save"></button>
      </div>
    </div>
  </div>

  <div id="role-plaza-overlay" class="approval-overlay hidden" role="dialog" aria-modal="true">
    <div class="approval-card plaza-card">
      <header class="plaza-head">
        <h3 class="approval-title" data-i18n="plaza.roleTitle"></h3>
        <div class="plaza-head-actions">
          <input type="search" class="plaza-search" id="role-plaza-search" autocomplete="off" spellcheck="false" data-i18n-placeholder="plaza.searchRole" />
          <button type="button" class="btn ghost sm" id="role-plaza-create" data-i18n="plaza.roleCreate"></button>
          <button type="button" class="icon-btn" id="role-plaza-close" aria-label="×">×</button>
        </div>
      </header>
      <div class="plaza-filters" id="role-plaza-filters"></div>
      <div class="plaza-sections" id="role-plaza-sections"></div>
      <div class="plaza-empty hidden" id="role-plaza-empty" data-i18n="plaza.roleEmpty"></div>
    </div>
  </div>

  <div id="skill-plaza-overlay" class="approval-overlay hidden" role="dialog" aria-modal="true">
    <div class="approval-card plaza-card">
      <header class="plaza-head">
        <h3 class="approval-title" data-i18n="plaza.skillTitle"></h3>
        <div class="plaza-head-actions">
          <input type="search" class="plaza-search" id="skill-plaza-search" autocomplete="off" spellcheck="false" data-i18n-placeholder="plaza.searchSkill" />
          <button type="button" class="icon-btn" id="skill-plaza-close" aria-label="×">×</button>
        </div>
      </header>
      <div class="skill-mode-bar" id="skill-mode-bar"></div>
      <div class="plaza-filters" id="skill-plaza-filters"></div>
      <div class="plaza-sections" id="skill-plaza-sections"></div>
      <div class="plaza-empty hidden" id="skill-plaza-empty" data-i18n="plaza.skillEmpty"></div>
    </div>
  </div>

  <div id="role-editor-overlay" class="approval-overlay hidden" role="dialog" aria-modal="true">
    <div class="approval-card plaza-editor-card">
      <h3 class="approval-title" id="role-editor-title" data-i18n="plaza.roleCreate"></h3>
      <label class="model-field">
        <span class="model-field-label" data-i18n="plaza.roleId"></span>
        <input type="text" class="ws-create-input" id="role-editor-id" autocomplete="off" spellcheck="false" placeholder="my-analyst" />
      </label>
      <label class="model-field">
        <span class="model-field-label" data-i18n="plaza.roleDivision"></span>
        <select id="role-editor-division" class="work-mode-select"></select>
      </label>
      <label class="model-field">
        <span class="model-field-label" data-i18n="plaza.roleEmoji"></span>
        <input type="text" class="ws-create-input" id="role-editor-emoji" autocomplete="off" spellcheck="false" placeholder="🎭" />
      </label>
      <label class="model-field">
        <span class="model-field-label" data-i18n="plaza.roleVibe"></span>
        <input type="text" class="ws-create-input" id="role-editor-vibe" autocomplete="off" spellcheck="false" data-i18n-placeholder="plaza.roleVibeHint" />
      </label>
      <label class="model-field">
        <span class="model-field-label" data-i18n="plaza.roleWhen"></span>
        <input type="text" class="ws-create-input" id="role-editor-when" autocomplete="off" spellcheck="false" data-i18n-placeholder="plaza.roleWhenHint" />
      </label>
      <label class="model-field">
        <span class="model-field-label" data-i18n="plaza.roleLabel"></span>
        <input type="text" class="ws-create-input" id="role-editor-label" autocomplete="off" spellcheck="false" />
      </label>
      <label class="model-field">
        <span class="model-field-label" data-i18n="plaza.roleTitleField"></span>
        <input type="text" class="ws-create-input" id="role-editor-title-field" autocomplete="off" spellcheck="false" />
      </label>
      <label class="model-field">
        <span class="model-field-label" data-i18n="plaza.roleDesc"></span>
        <input type="text" class="ws-create-input" id="role-editor-desc" autocomplete="off" spellcheck="false" />
      </label>
      <label class="model-field">
        <span class="model-field-label" data-i18n="plaza.roleCaps"></span>
        <input type="text" class="ws-create-input" id="role-editor-caps" autocomplete="off" spellcheck="false" data-i18n-placeholder="plaza.roleCapsHint" />
      </label>
      <label class="model-field">
        <span class="model-field-label" data-i18n="plaza.rolePersona"></span>
        <textarea class="ws-create-input role-editor-persona" id="role-editor-persona" rows="8" spellcheck="false"></textarea>
      </label>
      <p class="ws-create-error hidden" id="role-editor-error"></p>
      <div class="approval-actions">
        <button type="button" class="btn ghost" id="role-editor-cancel" data-i18n="common.cancel"></button>
        <button type="button" class="btn primary" id="role-editor-save" data-i18n="common.save"></button>
      </div>
    </div>
  </div>

  <div id="model-plaza-overlay" class="approval-overlay hidden" role="dialog" aria-modal="true">
    <div class="approval-card plaza-card model-plaza-card">
      <header class="plaza-head">
        <h3 class="approval-title" data-i18n="plaza.modelTitle"></h3>
        <div class="plaza-head-actions">
          <button type="button" class="btn ghost sm" id="model-plaza-conn" data-i18n="plaza.modelConn"></button>
          <button type="button" class="icon-btn" id="model-plaza-close" aria-label="×">×</button>
        </div>
      </header>
      <div class="model-auto-row" id="model-plaza-auto-row">
        <div class="model-auto-head">
          <span class="model-auto-label" data-i18n="model.smartRouting"></span>
          <span class="model-auto-hint" data-i18n="model.smartRoutingHint"></span>
        </div>
        <div class="model-auto-chips">
          <button type="button" class="model-chip auto" data-model="auto:cost_optimized" data-i18n="model.autoStrategy.cost_optimized"></button>
          <button type="button" class="model-chip auto" data-model="auto:balanced" data-i18n="model.autoStrategy.balanced"></button>
          <button type="button" class="model-chip auto" data-model="auto:quality_first" data-i18n="model.autoStrategy.quality_first"></button>
          <button type="button" class="model-chip auto" data-model="auto:latency_critical" data-i18n="model.autoStrategy.latency_critical"></button>
        </div>
      </div>
      <div class="model-list-panel" id="model-plaza-list">
        <div class="model-list-bar">
          <span class="model-list-search-icon" aria-hidden="true">🔍</span>
          <input type="text" class="model-list-search" id="model-plaza-search" autocomplete="off" spellcheck="false" data-i18n-placeholder="model.filterPlaceholder" />
          <span class="model-list-count" id="model-plaza-count"></span>
        </div>
        <div class="model-facets" id="model-plaza-facets"></div>
        <div class="model-list-body" id="model-plaza-chips" role="listbox"></div>
        <div class="model-list-empty hidden" id="model-plaza-empty" data-i18n="model.filterEmpty"></div>
      </div>
      <p class="model-field-hint" id="model-plaza-hint" data-i18n="plaza.modelHint"></p>
      <p class="ws-create-error hidden" id="model-plaza-error"></p>
      <div class="approval-actions">
        <button type="button" class="btn ghost" id="model-plaza-cancel" data-i18n="common.cancel"></button>
        <button type="button" class="btn primary" id="model-plaza-save" data-i18n="common.save"></button>
      </div>
    </div>
  </div>

  <div id="approval-overlay" class="approval-overlay hidden" role="dialog" aria-modal="true">
    <div class="approval-card">
      <h3 class="approval-title" data-i18n="approval.title"></h3>
      <p class="approval-summary" id="approval-summary"></p>
      <pre class="approval-url" id="approval-url"></pre>
      <div class="approval-diff hidden" id="approval-diff">
        <div class="approval-diff-head">
          <span data-i18n="approval.diffTitle"></span>
          <span class="approval-diff-stat" id="approval-diff-stat"></span>
        </div>
        <pre class="approval-diff-body" id="approval-diff-body"></pre>
      </div>
      <p class="approval-hint" data-i18n="approval.hint"></p>
      <div class="approval-actions">
        <button type="button" class="btn ghost" id="approval-deny" data-i18n="approval.deny"></button>
        <button type="button" class="btn primary" id="approval-allow" data-i18n="approval.allow"></button>
      </div>
    </div>
  </div>

  <div id="review-overlay" class="approval-overlay hidden" role="dialog" aria-modal="true">
    <div class="approval-card">
      <h3 class="approval-title" data-i18n="review.title"></h3>
      <p class="approval-summary" data-i18n="review.hint"></p>
      <div class="review-options">
        <label class="review-radio">
          <input type="radio" name="review-scope" value="file" checked />
          <span data-i18n="review.scopeFile"></span>
        </label>
        <label class="review-radio">
          <input type="radio" name="review-scope" value="diff" />
          <span data-i18n="review.scopeDiff"></span>
        </label>
        <label class="review-radio">
          <input type="radio" name="review-scope" value="staged" />
          <span data-i18n="review.scopeStaged"></span>
        </label>
      </div>
      <div class="approval-actions">
        <button type="button" class="btn ghost" id="review-cancel" data-i18n="common.cancel"></button>
        <button type="button" class="btn primary" id="review-run" data-i18n="review.run"></button>
      </div>
    </div>
  </div>

  <div id="retry-options-overlay" class="approval-overlay hidden" role="dialog" aria-modal="true">
    <div class="approval-card retry-options-card">
      <h3 class="approval-title" data-i18n="chat.retryOptionsTitle"></h3>
      <p class="approval-summary" data-i18n="chat.retryOptionsHint"></p>
      <label class="retry-opt-field">
        <span class="retry-opt-label" data-i18n="agent.mode"></span>
        <select id="retry-opt-work-mode" class="work-mode-select"></select>
      </label>
      <label class="retry-opt-field">
        <span class="retry-opt-label" data-i18n="agent.role"></span>
        <div class="role-tree-select" id="role-tree-retry" data-role-tree-context="retry">
          <button type="button" class="role-tree-trigger work-mode-select" aria-haspopup="listbox" aria-expanded="false">
            <span class="role-tree-trigger-label"></span>
            <span class="role-tree-chevron" aria-hidden="true">▾</span>
          </button>
          <div class="role-tree-menu hidden" role="listbox"></div>
        </div>
      </label>
      <label class="retry-opt-field">
        <span class="retry-opt-label" data-i18n="chat.retryModel"></span>
        <input type="text" class="ws-create-input" id="retry-opt-model" autocomplete="off" spellcheck="false" />
        <span class="model-field-hint" data-i18n="chat.retryModelHint"></span>
      </label>
      <div class="approval-actions">
        <button type="button" class="btn ghost" id="retry-opt-cancel" data-i18n="common.cancel"></button>
        <button type="button" class="btn primary" id="retry-opt-confirm" data-i18n="chat.retryConfirm"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
  <script src="/static/app.js?v=78" type="module"></script>
</body>
</html>
