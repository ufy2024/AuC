<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AuC</title>
  <link rel="stylesheet" href="/static/themes.css?v=22" />
  <link rel="stylesheet" href="/static/styles.css?v=22" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="/static/vendor/xterm.css?v=22" />
</head>
<body>
  <div id="app" class="mode-code" data-color-theme="monokai" data-icon-theme="office-material">
    <header class="topbar">
      <div class="brand">
        <span class="logo">◆</span>
        <span class="name">AuC</span>
        <span class="version" id="version"></span>
      </div>
      <div class="mode-switch" role="tablist">
        <button type="button" class="mode-btn active" data-mode="code" role="tab">Code</button>
        <button type="button" class="mode-btn" data-mode="chat" role="tab">Chat</button>
      </div>
      <div class="topbar-meta">
        <div class="theme-picker-wrap" id="theme-picker-wrap">
          <button type="button" class="icon-btn" id="theme-picker-btn" title="颜色主题与图标主题" aria-haspopup="true" aria-expanded="false"></button>
          <div class="theme-picker-menu hidden" id="theme-picker-menu" role="menu" aria-label="主题">
            <div class="theme-picker-section">
              <div class="theme-picker-label">颜色主题</div>
              <div class="theme-picker-list" id="color-theme-list"></div>
            </div>
            <div class="theme-picker-section">
              <div class="theme-picker-label">图标主题</div>
              <div class="theme-picker-list" id="icon-theme-list"></div>
            </div>
          </div>
        </div>
        <span class="model-pill" id="model-pill"></span>
        <span class="ws-pill" id="ws-pill" title="工作区"></span>
      </div>
    </header>

    <nav class="sidebar-rail" id="sidebar-rail" aria-label="侧栏快捷栏">
      <button type="button" class="rail-btn" id="sidebar-show" title="展开侧栏"></button>
      <span class="rail-divider"></span>
      <button type="button" class="rail-btn" data-rail-section="workspace" title="工作区"></button>
      <button type="button" class="rail-btn" data-rail-section="projects" title="项目"></button>
      <button type="button" class="rail-btn" data-rail-section="conversations" title="对话"></button>
    </nav>

    <div class="layout">
      <!-- 工作区侧栏 -->
      <aside class="workspace-panel" id="workspace-panel">
        <div class="sidebar-top">
          <button type="button" class="icon-btn" id="sidebar-hide" title="收起侧栏"></button>
        </div>

        <section class="sidebar-section" data-section="workspace" id="section-workspace">
          <header class="section-head">
            <span class="section-leading" id="icon-sec-workspace"></span>
            <span class="section-title">工作区</span>
            <div class="section-actions">
              <button type="button" class="icon-btn" id="ws-new-file" title="新建文件"></button>
              <button type="button" class="icon-btn" id="ws-new-folder" title="新建文件夹"></button>
              <button type="button" class="icon-btn" id="ws-refresh" title="刷新"></button>
              <button type="button" class="icon-btn section-toggle" data-section="workspace" title="折叠"></button>
            </div>
          </header>
          <div class="section-body">
            <div class="ws-path" id="ws-path">.</div>
            <nav class="file-tree" id="file-tree" aria-label="文件树"></nav>
            <div id="tree-context-menu" class="tree-context-menu hidden" role="menu"></div>
          </div>
        </section>

        <section class="sidebar-section" data-section="projects" id="section-projects">
          <header class="section-head">
            <span class="section-leading" id="icon-sec-projects"></span>
            <span class="section-title">项目</span>
            <div class="section-actions">
              <button type="button" class="icon-btn" id="projects-refresh" title="刷新"></button>
              <button type="button" class="icon-btn section-toggle" data-section="projects" title="折叠"></button>
            </div>
          </header>
          <div class="section-body">
            <div class="project-list" id="project-list"></div>
          </div>
        </section>

        <section class="sidebar-section" data-section="conversations" id="section-conversations">
          <header class="section-head">
            <span class="section-leading" id="icon-sec-conversations"></span>
            <span class="section-title">对话</span>
            <div class="section-actions">
              <button type="button" class="icon-btn" id="conv-new" title="新对话"></button>
              <button type="button" class="icon-btn section-toggle" data-section="conversations" title="折叠"></button>
            </div>
          </header>
          <div class="section-body">
            <div class="conversation-list" id="conversation-list"></div>
          </div>
        </section>
      </aside>

      <!-- Code 模式：编辑器 -->
      <main class="editor-panel" id="editor-panel">
        <div class="tab-bar" id="tab-bar">
          <div class="tab-bar-tabs" id="tab-bar-tabs"></div>
          <div class="tab-bar-actions">
            <button type="button" class="icon-btn" id="btn-terminal" title="终端"></button>
          </div>
        </div>
        <div class="md-toolbar hidden" id="md-toolbar">
          <button type="button" class="btn ghost sm" data-md-view="edit">编辑</button>
          <button type="button" class="btn ghost sm" data-md-view="preview">预览</button>
        </div>
        <div class="editor-split" id="editor-split">
          <div class="editor-wrap" id="editor-wrap">
            <div id="monaco" class="monaco-host"></div>
            <div id="md-preview" class="md-preview hidden"></div>
            <div id="image-preview" class="image-preview hidden"></div>
            <div id="app-preview" class="app-preview hidden">
              <div class="preview-toolbar">
                <span id="preview-title">预览</span>
                <button type="button" class="btn ghost sm" id="preview-stop">停止</button>
                <button type="button" class="btn ghost sm" id="preview-newtab">新标签页</button>
              </div>
              <iframe id="preview-frame" title="项目预览" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
            </div>
            <div class="editor-empty" id="editor-empty">
              <p>从左侧工作区选择文件开始编辑</p>
              <p class="hint">JupyterLab 风格 · 下方终端 · 右侧 Agent</p>
            </div>
          </div>
          <div class="terminal-panel is-collapsed" id="terminal-panel">
            <div class="terminal-resize-handle" id="terminal-resize-handle" title="拖动调整高度"></div>
            <header class="terminal-toolbar">
              <span class="terminal-title">终端</span>
              <span class="terminal-cwd" id="terminal-cwd"></span>
              <div class="terminal-actions">
                <button type="button" class="btn ghost sm" id="terminal-new" title="新建会话">+</button>
                <button type="button" class="icon-btn" id="terminal-close" title="关闭终端"></button>
              </div>
            </header>
            <div class="terminal-host" id="terminal-host"></div>
          </div>
        </div>
      </main>

      <!-- Chat 模式：顶部智能体信息 -->
      <header class="chat-header" id="chat-header">
        <div class="chat-header-inner">
          <div class="agent-profile" id="agent-profile">
            <div class="agent-avatar" aria-hidden="true">◆</div>
            <h1 class="agent-title" id="agent-title">Coder 专家</h1>
            <span class="agent-status" id="agent-status">就绪</span>
            <p class="agent-desc" id="agent-desc">编程、调试与架构设计助手</p>
              <div class="agent-meta" id="agent-meta"></div>
              <div class="agent-tags" id="agent-tags"></div>
              <div class="work-mode-bar" id="work-mode-bar">
                <label class="work-mode-label" for="role-select">角色</label>
                <select id="role-select" class="work-mode-select" title="选择智能体角色（persona 与进化记忆按角色隔离）">
                  <option value="coder">编程专家</option>
                </select>
                <label class="work-mode-label" for="work-mode-select">工作模式</label>
                <select id="work-mode-select" class="work-mode-select" title="自动识别或手动指定智能体工作模式">
                  <option value="auto">自动识别</option>
                </select>
              </div>
            </div>
          </div>
        </header>

      <!-- Chat 模式：对话消息区 -->
      <main class="chat-main" id="chat-main">
        <div class="chat-scroll">
          <div class="chat-center">
            <div class="chat-messages" id="chat-messages"></div>
          </div>
        </div>
      </main>

      <!-- Agent 侧栏 -->
      <aside class="agent-panel" id="agent-panel">
        <div class="panel-head">
          <span class="panel-title">Agent</span>
          <button type="button" class="icon-btn" id="chat-clear" title="清空对话"></button>
        </div>
        <div class="agent-messages" id="agent-messages"></div>
        <form class="composer" id="composer">
          <div class="context-bar" id="context-bar">
            <label class="work-mode-inline" title="智能体角色">
              <span class="work-mode-label">角色</span>
              <select id="role-agent" class="work-mode-select sm"></select>
            </label>
            <label class="work-mode-inline" title="工作模式">
              <span class="work-mode-label">模式</span>
              <select id="work-mode-agent" class="work-mode-select sm"></select>
            </label>
            <label class="ctx-toggle" title="自动附带当前打开的文件内容">
              <input type="checkbox" id="ctx-auto" checked />
              <span id="ctx-label">附带当前文件</span>
            </label>
            <button type="button" class="btn ghost sm" id="btn-insert-file" title="插入 @当前文件">@文件</button>
            <button type="button" class="btn ghost sm" id="btn-insert-sel" title="插入 @选中">@选中</button>
          </div>
          <div class="attach-strip" id="attach-strip-agent"></div>
          <textarea id="prompt" rows="3" placeholder="描述要如何修改当前代码… 例如：给游戏加个暂停按钮"></textarea>
          <div class="composer-actions">
            <input type="file" id="file-agent" accept="image/png,image/jpeg,image/gif,image/webp" multiple hidden />
            <button type="button" class="btn ghost icon-only" id="btn-attach-agent" title="上传图片"></button>
            <button type="button" class="btn ghost" id="btn-cancel">停止</button>
            <button type="submit" class="btn primary" id="btn-send">发送</button>
          </div>
        </form>
      </aside>
    </div>

    <!-- Chat 模式底部输入 -->
    <div class="chat-composer-bar" id="chat-composer-bar">
      <div class="chat-composer-inner">
        <div class="attach-col">
          <div class="attach-strip" id="attach-strip-chat"></div>
          <textarea id="prompt-chat" rows="2" placeholder="问我任何事… @文件 · 粘贴或上传图片"></textarea>
        </div>
        <input type="file" id="file-chat" accept="image/png,image/jpeg,image/gif,image/webp" multiple hidden />
        <button type="button" class="btn ghost icon-only" id="btn-attach-chat" title="上传图片"></button>
        <button type="button" class="btn ghost icon-only" id="btn-clear-chat" title="清空"></button>
        <button type="button" class="btn ghost" id="btn-cancel-chat" disabled>停止</button>
        <button type="button" class="btn primary" id="btn-send-chat">发送</button>
      </div>
    </div>
  </div>

  <div id="ws-create-overlay" class="approval-overlay hidden" role="dialog" aria-modal="true">
    <div class="approval-card ws-create-card">
      <h3 class="approval-title" id="ws-create-title">新建</h3>
      <p class="approval-summary" id="ws-create-hint"></p>
      <input type="text" class="ws-create-input" id="ws-create-input" autocomplete="off" spellcheck="false" />
      <p class="ws-create-error hidden" id="ws-create-error"></p>
      <div class="approval-actions">
        <button type="button" class="btn ghost" id="ws-create-cancel">取消</button>
        <button type="button" class="btn primary" id="ws-create-confirm">创建</button>
      </div>
    </div>
  </div>

  <div id="approval-overlay" class="approval-overlay hidden" role="dialog" aria-modal="true">
    <div class="approval-card">
      <h3 class="approval-title">访问外部链接需授权</h3>
      <p class="approval-summary" id="approval-summary"></p>
      <pre class="approval-url" id="approval-url"></pre>
      <p class="approval-hint">批准后智能体才会发起网络请求；拒绝将中止本次操作。</p>
      <div class="approval-actions">
        <button type="button" class="btn ghost" id="approval-deny">拒绝</button>
        <button type="button" class="btn primary" id="approval-allow">允许访问</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
  <script src="/static/app.js?v=22" type="module"></script>
</body>
</html>
